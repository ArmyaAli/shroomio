services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: shroomio-server:dev
    environment:
      SHROOM_SERVER_BIND: 0.0.0.0
      SHROOM_SERVER_PORT: 7777
      SHROOM_SERVER_DB_PATH: /data/shroomio.db
    ports:
      - "7777:7777/udp"
    volumes:
      - shroomio-server-data:/data

volumes:
  shroomio-server-data:
