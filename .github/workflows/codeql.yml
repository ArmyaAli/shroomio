name: CodeQL

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Makefile'
      - '.github/workflows/**'
      - '.devcontainer/**'
      - 'design/**'
      - 'docs/**'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make

      - name: Download ENet
        run: |
          mkdir -p vendor
          curl -L https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz -o /tmp/enet.tar.gz
          tar -xzf /tmp/enet.tar.gz -C vendor
          mv vendor/enet-1.3.18 vendor/enet

      - name: Download raylib
        run: make vendor

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Build Linux client
        run: make linux

      - name: Build server
        run: make server

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
