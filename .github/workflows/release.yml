name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-calculates from latest tag)
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch
      version:
        description: Manual version (only if bump is 'none'). Format 1.2.3
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release Input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute version from bump type
        id: compute
        run: |
          bump="${{ inputs.bump }}"
          manual="${{ inputs.version }}"

          if [ "$bump" = "none" ]; then
            if [ -z "$manual" ]; then
              echo "When bump is 'none', a manual version is required"
              exit 1
            fi
            version="$manual"
          else
            latest="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')"
            latest="${latest#v}"
            IFS='.' read -r major minor patch <<< "$latest"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"

            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            version="$major.$minor.$patch"
          fi

          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            printf '%s\n' "Version '$version' must look like 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

          if git rev-parse "v$version" >/dev/null 2>&1; then
            printf '%s\n' "Tag v$version already exists"
            exit 1
          fi

          echo "Computed version: v$version (bump=$bump)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            tar \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-release-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build binaries
        run: |
          make client-linux
          make server-linux

      - name: Package binaries
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release-assets release-stage/linux/client release-stage/linux/server
          cp dist/linux/client/shroomio release-stage/linux/client/
          cp dist/linux/server/shroomio-server release-stage/linux/server/
          tar -czf release-assets/shroomio-${VERSION}-linux-x64.tar.gz -C release-stage linux

      - name: Upload Linux asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/*

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            make \
            mingw-w64 \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-windows-release-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build binaries
        run: |
          make client-windows
          make server-windows

      - name: Package binaries
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release-assets release-stage/windows/client release-stage/windows/server
          cp dist/windows/client/shroomio.exe release-stage/windows/client/
          cp dist/windows/server/shroomio-server.exe release-stage/windows/server/
          (cd release-stage && zip -r ../release-assets/shroomio-${VERSION}-windows-x64.zip windows)

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/*

  build-macos:
    name: Build macOS
    runs-on: macos-15-intel
    needs: validate
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja pkg-config

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-release-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build binaries
        run: |
          make client-macos
          make server-macos

      - name: Package binaries
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release-assets release-stage/macos/client release-stage/macos/server
          cp dist/macos/client/shroomio release-stage/macos/client/
          cp dist/macos/server/shroomio-server release-stage/macos/server/
          tar -czf release-assets/shroomio-${VERSION}-macos-x64.tar.gz -C release-stage macos

      - name: Validate macOS asset
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          archive="release-assets/shroomio-${VERSION}-macos-x64.tar.gz"
          test -s "$archive"
          tar -tzf "$archive" > macos-archive-contents.txt
          grep -Fxq 'macos/client/shroomio' macos-archive-contents.txt
          grep -Fxq 'macos/server/shroomio-server' macos-archive-contents.txt
          file release-stage/macos/client/shroomio | grep -Eq 'Mach-O 64-bit.*x86_64'
          file release-stage/macos/server/shroomio-server | grep -Eq 'Mach-O 64-bit.*x86_64'

      - name: Upload macOS asset
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: release-assets/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-linux
      - build-windows
      - build-macos
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate changelogs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          TARGET_COMMIT: ${{ github.sha }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            gh api \
              --method POST \
              "repos/$REPOSITORY/releases/generate-notes" \
              -f tag_name="v$VERSION" \
              -f previous_tag_name="$previous_tag" \
              -f target_commitish="$TARGET_COMMIT" \
              --jq .body > release-notes.md
          else
            gh api \
              --method POST \
              "repos/$REPOSITORY/releases/generate-notes" \
              -f tag_name="v$VERSION" \
              -f target_commitish="$TARGET_COMMIT" \
              --jq .body > release-notes.md
          fi

          {
            printf 'shroomio full changelog through v%s\n' "$VERSION"
            printf 'Generated from git history on %s\n\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git log --date=short --pretty=format:'%ad %h %s'
          } > release-assets/CHANGELOG-v${VERSION}.txt

      - name: Generate checksums
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS-v${VERSION}.txt

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" \
            release-assets/* \
            --title "shroomio v$VERSION" \
            --notes-file release-notes.md
