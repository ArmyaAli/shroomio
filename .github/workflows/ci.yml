name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'assets/**'
      - 'website/**'
      - 'scripts/**'
      - 'Makefile'
      - 'vcpkg.json'
      - '.gitmodules'
      - 'vcpkg'
      - 'vcpkg/**'
      - '.gitignore'
      - '.clang-format'
      - '.github/workflows/**'
      - '.devcontainer/**'
      - '.opencode/**'
      - 'Dockerfile*'
      - 'compose.yaml'
      - 'design/**'
      - 'docs/**'
      - 'database/**'
      - '*.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.filter.outputs.docs-only }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        name: Detect docs-only changes
        run: |
          docs_only=true
          website=false
          while IFS= read -r path; do
            case "$path" in
              docs/*|design/*|*.md) ;;
              *) docs_only=false ;;
            esac
            case "$path" in
              website/*|assets/marketing/*) website=true ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          printf 'docs-only=%s\n' "$docs_only" >> "$GITHUB_OUTPUT"
          printf 'website=%s\n' "$website" >> "$GITHUB_OUTPUT"

  website:
    name: Website
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Check Astro project
        run: npm run check

      - name: Run website unit tests
        run: npm run test:unit

      - name: Verify production output
        run: npm run test:build

      - name: Run browser tests
        run: npm run test:e2e

  quality:
    name: Quality
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang-format \
            cppcheck \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            zip \
            xvfb

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-quality-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: make vcpkg-bootstrap

      - name: Install Linux vcpkg dependencies
        run: make vcpkg-install-linux

      - name: Check code formatting
        run: make format-check

      - name: Download manual test dependencies
        run: make vendor

      - name: Run cppcheck
        run: make cppcheck

      - name: Run unit tests
        run: make test

  build-linux:
    name: Build Linux
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-linux-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build Linux client
        run: make client-linux

      - name: Build server
        run: make server-linux

  valgrind:
    name: Valgrind
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            valgrind \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-valgrind-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: make vcpkg-bootstrap

      - name: Install Linux vcpkg dependencies
        run: make vcpkg-install-linux

      - name: Download manual test dependencies
        run: make vendor

      - name: Run Valgrind memory checks
        run: make valgrind-test

  build-windows:
    name: Build Windows
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            make \
            mingw-w64 \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-windows-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build Windows client
        run: make client-windows

      - name: Build Windows server
        run: make server-windows

  build-macos:
    name: Build macOS
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja pkg-config

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build macOS client
        run: make client-macos

      - name: Build macOS server
        run: make server-macos

      - name: Validate macOS binaries
        run: |
          test -x dist/macos/client/shroomio
          test -x dist/macos/server/shroomio-server
          file dist/macos/client/shroomio | grep -Eq 'Mach-O 64-bit.*x86_64'
          file dist/macos/server/shroomio-server | grep -Eq 'Mach-O 64-bit.*x86_64'
          otool -L dist/macos/client/shroomio
          otool -L dist/macos/server/shroomio-server

      - name: Run macOS server smoke test
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          ./dist/macos/server/shroomio-server --smoke-test \
            --bind 127.0.0.1 \
            --port 37777 \
            --database "$tmpdir/shroomio-smoke.db"

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify markdown files exist and are non-empty
        run: |
          shopt -s nullglob
          count=0
          for f in docs/**/*.md design/*.md *.md; do
            [ -s "$f" ] || { echo "::error::$f is empty"; exit 1; }
            count=$((count + 1))
          done
          echo "Validated $count markdown file(s)."

  build:
    name: build
    needs:
      - changes
      - quality
      - build-linux
      - valgrind
      - build-windows
      - build-macos
      - docs
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Confirm CI gates passed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs-only }}
          DOCS_RESULT: ${{ needs.docs.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_LINUX_RESULT: ${{ needs.build-linux.result }}
          VALGRIND_RESULT: ${{ needs.valgrind.result }}
          BUILD_WINDOWS_RESULT: ${{ needs.build-windows.result }}
          BUILD_MACOS_RESULT: ${{ needs.build-macos.result }}
        run: |
          echo "Changes job: $CHANGES_RESULT"
          echo "Docs-only: $DOCS_ONLY"
          if [ "$DOCS_ONLY" = "true" ]; then
            if [ "$DOCS_RESULT" != "success" ]; then
              echo "::error::Docs gate failed: $DOCS_RESULT"
              exit 1
            fi
          else
            for entry in "quality:$QUALITY_RESULT" \
                         "build-linux:$BUILD_LINUX_RESULT" \
                         "valgrind:$VALGRIND_RESULT" \
                         "build-windows:$BUILD_WINDOWS_RESULT" \
                         "build-macos:$BUILD_MACOS_RESULT"; do
              job="${entry%%:*}"
              result="${entry##*:}"
              if [ "$result" != "success" ]; then
                echo "::error::Required job $job failed: $result"
                exit 1
              fi
            done
          fi
          printf '%s\n' 'All CI gates passed.'
