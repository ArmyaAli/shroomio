name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.clang-format'
      - '.github/workflows/**'
      - 'design/**'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang-format \
            cppcheck \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make

      - name: Check code formatting
        run: make format-check

      - name: Download ENet
        run: |
          mkdir -p vendor
          curl -L https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz -o /tmp/enet.tar.gz
          tar -xzf /tmp/enet.tar.gz -C vendor
          mv vendor/enet-1.3.18 vendor/enet

      - name: Download raylib
        run: make vendor

      - name: Run cppcheck
        run: make cppcheck

      - name: Run unit tests
        run: make test

      - name: Build Linux client
        run: make linux

      - name: Build server
        run: make server
