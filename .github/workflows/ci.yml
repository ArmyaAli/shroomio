name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang-format \
            cppcheck \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make

      - name: Check code formatting
        run: |
          find src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

      - name: Download ENet
        run: |
          mkdir -p vendor
          curl -L https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz -o /tmp/enet.tar.gz
          tar -xzf /tmp/enet.tar.gz -C vendor
          mv vendor/enet-1.3.18 vendor/enet

      - name: Download raylib
        run: make vendor

      - name: Lint with cppcheck
        run: cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --include=src/shared/config.h src/

      - name: Build Linux client
        run: make linux

      - name: Build server
        run: make server
