name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - 'vcpkg.json'
      - '.gitmodules'
      - 'vcpkg'
      - 'vcpkg/**'
      - '.gitignore'
      - '.clang-format'
      - '.github/workflows/**'
      - '.devcontainer/**'
      - '.opencode/**'
      - 'design/**'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang-format \
            cppcheck \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
              libxinerama-dev \
              libxrandr-dev \
              mingw-w64 \
              make \
              ninja-build \
              pkg-config \
              unzip \
              zip \
              xvfb

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: make vcpkg-bootstrap

      - name: Install vcpkg dependencies
        run: make vcpkg-install

      - name: Check code formatting
        run: make format-check

      - name: Download manual test dependencies
        run: make vendor

      - name: Run cppcheck
        run: make cppcheck

      - name: Run unit tests
        run: make test

      - name: Build Linux client
        run: make linux

      - name: Build Windows client
        run: make windows

      - name: Build server
        run: make server
