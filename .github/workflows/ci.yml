name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'assets/**'
      - 'scripts/**'
      - 'Makefile'
      - 'vcpkg.json'
      - '.gitmodules'
      - 'vcpkg'
      - 'vcpkg/**'
      - '.gitignore'
      - '.clang-format'
      - '.github/workflows/**'
      - '.devcontainer/**'
      - '.opencode/**'
      - 'Dockerfile*'
      - 'compose.yaml'
      - 'design/**'
      - 'docs/**'
      - 'database/**'
      - '*.md'

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.filter.outputs.docs-only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            docs-only:
              - 'docs/**'
              - 'design/**'
              - '*.md'

  quality:
    name: Quality
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang-format \
            cppcheck \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            zip \
            xvfb

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-quality-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: make vcpkg-bootstrap

      - name: Install Linux vcpkg dependencies
        run: make vcpkg-install-linux

      - name: Check code formatting
        run: make format-check

      - name: Download manual test dependencies
        run: make vendor

      - name: Run cppcheck
        run: make cppcheck

      - name: Run unit tests
        run: make test

  build-linux:
    name: Build Linux
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-linux-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build Linux client
        run: make client-linux

      - name: Build server
        run: make server-linux

  valgrind:
    name: Valgrind
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libasound2-dev \
            libgl1-mesa-dev \
            libsqlite3-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            unzip \
            valgrind \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-valgrind-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: make vcpkg-bootstrap

      - name: Install Linux vcpkg dependencies
        run: make vcpkg-install-linux

      - name: Download manual test dependencies
        run: make vendor

      - name: Run Valgrind memory checks
        run: make valgrind-test

  build-windows:
    name: Build Windows
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            make \
            mingw-w64 \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-windows-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build Windows client
        run: make client-windows

      - name: Build Windows server
        run: make server-windows

  build-macos:
    name: Build macOS
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja pkg-config

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg-${{ hashFiles('vcpkg.json', '.gitmodules', 'vcpkg/ports/raylib/vcpkg.json', 'vcpkg/ports/imgui/vcpkg.json', 'vcpkg/ports/enet/vcpkg.json') }}

      - name: Build macOS client
        run: make client-macos

      - name: Build macOS server
        run: make server-macos

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify markdown files exist and are non-empty
        run: |
          shopt -s nullglob
          count=0
          for f in docs/**/*.md design/*.md *.md; do
            [ -s "$f" ] || { echo "::error::$f is empty"; exit 1; }
            count=$((count + 1))
          done
          echo "Validated $count markdown file(s)."

  build:
    name: build
    needs:
      - changes
      - quality
      - build-linux
      - valgrind
      - build-windows
      - build-macos
      - docs
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Confirm CI gates passed
        run: |
          result="${{ needs.changes.result }}"
          docs_only="${{ needs.changes.outputs.docs-only }}"
          echo "Changes job: $result"
          echo "Docs-only: $docs_only"
          if [ "$docs_only" = "true" ]; then
            if [ "${{ needs.docs.result }}" != "success" ]; then
              echo "::error::Docs gate failed: ${{ needs.docs.result }}"
              exit 1
            fi
          else
            for job in quality build-linux valgrind build-windows build-macos; do
              if [ "${{ needs.$job.result }}" != "success" ]; then
                echo "::error::Required job $job failed: ${{ needs.$job.result }}"
                exit 1
              fi
            done
          fi
          printf '%s\n' 'All CI gates passed.'
